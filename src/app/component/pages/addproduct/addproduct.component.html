

<div class="add-product-page">
  <div class="form-container">
    <h2><i class="fas fa-plus-circle"></i>Add New Product</h2>
    <form (submit)="saveData()">
      <div class="mb-3">
        <label for="productname" class="form-label">Product Name</label>
        <input type="text" name="name" [(ngModel)]="product.productname" class="form-control" id="productname" placeholder="Enter product name">
      </div>
      <div class="mb-3">
        <label for="fileupload" class="form-label">Upload Image</label>
        <input class="form-control" (change)="onFileSelected($event)" [(ngModel)]="product.productimageUrl" name="fileupload" type="file" id="formFile">
      </div>
      <div class="mb-3">
        <label for="productprice" class="form-label">Price</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" min="0" step="0.01" (blur)="formatPrice()" name="productprice" [(ngModel)]="product.productprice" class="form-control" id="productprice" placeholder="0.00">
        </div>
      </div>
      <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <select name="category" [(ngModel)]="product.productcategory" class="form-select" id="category">
          <option selected value="">Select Category</option>
          <option value="tshirt">T-Shirt</option>
          <option value="trouser">Trouser</option>
          <option value="pant">Pant</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" name="description" [(ngModel)]="product.productdescription" id="description" rows="4" placeholder="Enter product description"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save me-2"></i>Save Product
      </button>
    </form>
  </div>
</div>
